<script>
const STORAGE_KEY = 'rb3';

/* ---------------- STATE ---------------- */

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getState() {
  const s = loadState();

  if (!s.week) s.week = 1;
  if (!s.day) s.day = 1;
  if (s.qIdx === undefined) s.qIdx = 0;
  if (!s.entries) s.entries = [];
  if (!s.scope) s.scope = {};

  return s;
}

/* ---------------- SCOPE ---------------- */

function loadScope() {
  const raw = document.getElementById('scopePaste').value.trim();
  if (!raw) return showToast('Nothing pasted');

  const parsed = parseScope(raw);

  if (!parsed || Object.keys(parsed).length === 0) {
    return showToast('Scope not recognised');
  }

  const state = getState();
  state.scope = parsed;

  saveState(state);

  buildExpList(state.scope);
  expIdx = 0;

  render();

  showToast('Scope loaded');
}

function parseScope(raw) {
  const scope = {};
  const codes = ['CONF','TRUST','VIS','INST','IDEN','NERV','ADHD','REL','FEAR'];

  const cleaned = raw.replace(/[*]+/g, '').replace(/[_]{2,}/g, '');

  codes.forEach(code => {
    const start = cleaned.indexOf('##'+code+'##');
    if (start === -1) return;

    const next = cleaned.indexOf('##', start + 6);
    const block = (next > -1
      ? cleaned.slice(start + 6, next)
      : cleaned.slice(start + 6)
    ).trim();

    const summaryMatch = block.match(/SUMMARY:(.*?)(EXP:|$)/s);
    const summary = summaryMatch ? summaryMatch[1].trim() : '';

    const exps = [];
    const expMatches = [...block.matchAll(/EXP:(.*?)(?=EXP:|$)/gs)];

    expMatches.forEach((m, i) => {
      let text = m[1].trim();

      const tagMatch = text.match(/\[(.*?)\]\s*$/);
      const tags = tagMatch ? tagMatch[1].split(',').map(t=>t.trim()) : [];

      text = text.replace(/\[(.*?)\]\s*$/, '').trim();

      exps.push({
        id: i,
        text,
        tags,
        state: 'open',
        obs: {}
      });
    });

    scope[code] = { summary, exps };
  });

  return scope;
}

/* ---------------- EXPERIENCES ---------------- */

let expList = [];
let expIdx = 0;

function buildExpList(scope) {
  expList = [];
  if (!scope) return;

  const codes = ['CONF','TRUST','VIS','INST','IDEN','NERV','ADHD','REL','FEAR'];

  codes.forEach(code => {
    const block = scope[code];
    if (!block) return;

    block.exps.forEach((_, i) => {
      expList.push({ code, expIdx: i });
    });
  });
}

function renderExpCard() {
  const state = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = state.scope[item.code].exps[item.expIdx];

  const tags = exp.tags || [];

  const tagHtml = Object.keys(TAGS).map(t => {
    const on = tags.includes(t);
    return `
      <button class="pill ${on ? 'on' : ''}"
        data-tag="${encodeURIComponent(t)}"
        onclick="toggleTag(this)">
        ${t}
      </button>`;
  }).join('');

  document.getElementById('expCard').innerHTML = `
    <div class="exp-card-main">
      <div class="exp-heading-tag">${item.code}</div>
      <div class="exp-text-main">${exp.text}</div>

      <div class="pills-wrap">${tagHtml}</div>

      <textarea onchange="saveObs('what', this.value)">
        ${exp.obs?.what || ''}
      </textarea>

      <div style="margin-top:10px;">
        <button onclick="setState('progressing')">Progressing</button>
        <button onclick="setState('closed')">Closed</button>
      </div>
    </div>
  `;
}

/* ---------------- INTERACTION ---------------- */

function toggleTag(btn) {
  const tag = decodeURIComponent(btn.dataset.tag);

  const state = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = state.scope[item.code].exps[item.expIdx];

  if (!exp.tags) exp.tags = [];

  const i = exp.tags.indexOf(tag);
  if (i > -1) exp.tags.splice(i, 1);
  else exp.tags.push(tag);

  saveState(state);
  renderExpCard();
}

function saveObs(field, val) {
  const state = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = state.scope[item.code].exps[item.expIdx];

  if (!exp.obs) exp.obs = {};
  exp.obs[field] = val;

  saveState(state);
}

function setState(newState) {
  const state = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = state.scope[item.code].exps[item.expIdx];

  exp.state = exp.state === newState ? 'open' : newState;

  saveState(state);
  renderExpCard();
}

/* ---------------- NAV ---------------- */

function navExp(dir) {
  expIdx = (expIdx + dir + expList.length) % expList.length;
  renderExpCard();
}

/* ---------------- INIT ---------------- */

function render() {
  const state = getState();

  buildExpList(state.scope);

  if (expList.length) {
    renderExpCard();
    document.getElementById('expCardArea').style.display = 'block';
  } else {
    document.getElementById('scopePasteArea').style.display = 'block';
  }
}

/* ---------------- UI ---------------- */

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2000);
}

/* ---------------- TAG DEFINITIONS ---------------- */

const TAGS = {
  'Held ground': {},
  'Named it': {},
  'Did not react': {},
  'Read room': {},
  'Trust break': {},
  'Body signal': {},
  'Stayed quiet': {},
  'Used script': {},
  'Pattern spotted': {},
  'Still open': {},
  'Win noted': {},
  'Cost named': {},
  'Avoidance': {},
  'Catastrophising': {},
  'Rumination': {},
  'Repair': {}
};

/* ---------------- START ---------------- */

render();

</script>
