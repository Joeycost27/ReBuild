<script>

/* ---------------- STATE ---------------- */

const KEY = 'rb3';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}

function persist(s) {
  localStorage.setItem(KEY, JSON.stringify(s));
}

/* ✅ FIX: include scope */
function getState() {
  const s = load();
  return {
    week: s.week || 1,
    day: s.day || 1,
    qIdx: s.qIdx !== undefined ? s.qIdx : 0,
    entries: s.entries || [],
    scope: s.scope || {}
  };
}

/* ---------------- SCOPE ---------------- */

function loadScope() {
  const raw = document.getElementById('scopePaste').value.trim();
  if (!raw) return;

  const scope = parseScope(raw);

  const s = getState();
  s.scope = scope;

  persist(s); // ✅ REQUIRED

  buildExpList(scope);
  expIdx = 0;

  render();
}

function parseScope(raw) {
  const scope = {};
  const codes = ['CONF','TRUST','VIS','INST','IDEN','NERV','ADHD','REL','FEAR'];

  codes.forEach(code => {
    const part = raw.split('##'+code+'##')[1];
    if (!part) return;

    const block = part.split('##')[0];

    const exps = [];
    const matches = [...block.matchAll(/EXP:(.*?)(?=EXP:|$)/gs)];

    matches.forEach((m,i) => {
      let text = m[1].trim();

      const tagMatch = text.match(/\[(.*?)\]\s*$/);
      const tags = tagMatch ? tagMatch[1].split(',').map(t=>t.trim()) : [];

      text = text.replace(/\[(.*?)\]\s*$/, '').trim();

      exps.push({
        id:i,
        text,
        tags,
        state:'open',
        obs:{}
      });
    });

    scope[code] = { exps };
  });

  return scope;
}

/* ---------------- EXPERIENCES ---------------- */

let expList = [];
let expIdx = 0;

function buildExpList(scope) {
  expList = [];
  if (!scope) return;

  Object.keys(scope).forEach(code => {
    scope[code].exps.forEach((_,i)=>{
      expList.push({code,expIdx:i});
    });
  });
}

/* ✅ FIX: always read from state */
function renderExpCard() {
  const s = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = s.scope[item.code].exps[item.expIdx];

  const pills = Object.keys(TAGS).map(t=>{
    const on = exp.tags.includes(t);
    return `<span class="pill ${on?'on':''}"
      data-tag="${encodeURIComponent(t)}"
      onclick="toggleTag(this)">${t}</span>`;
  }).join('');

  document.getElementById('expCard').innerHTML = `
    <b>${item.code}</b>
    <div style="margin:10px 0;">${exp.text}</div>
    <div>${pills}</div>

    <textarea onchange="saveObs('note',this.value)">
${exp.obs?.note || ''}
</textarea>
  `;
}

/* ---------------- INTERACTION ---------------- */

/* ✅ FIX: guarded + re-render */
function toggleTag(btn) {
  const t = decodeURIComponent(btn.dataset.tag);

  const s = getState();
  const item = expList[expIdx];

  if (!item || !s.scope || !s.scope[item.code]) return;

  const exp = s.scope[item.code].exps[item.expIdx];
  if (!exp) return;

  if (!exp.tags) exp.tags = [];

  const i = exp.tags.indexOf(t);
  if (i>-1) exp.tags.splice(i,1);
  else exp.tags.push(t);

  persist(s);

  renderExpCard(); // ✅ THIS was missing
}

function saveObs(field,val){
  const s = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = s.scope[item.code].exps[item.expIdx];

  if (!exp.obs) exp.obs = {};
  exp.obs[field]=val;

  persist(s);
}

/* ---------------- NAV ---------------- */

function navExp(dir){
  expIdx = (expIdx + dir + expList.length) % expList.length;
  renderExpCard();
}

/* ---------------- TAGS ---------------- */

const TAGS = {
  'Held ground':{},
  'Named it':{},
  'Did not react':{},
  'Read room':{},
  'Trust break':{},
  'Body signal':{},
  'Pattern spotted':{},
  'Still open':{},
  'Win noted':{},
  'Cost named':{},
  'Avoidance':{},
  'Catastrophising':{},
  'Rumination':{},
  'Repair':{}
};

/* ---------------- INIT ---------------- */

function render(){
  const s = getState();

  if (s.scope && Object.keys(s.scope).length){
    buildExpList(s.scope);
    document.getElementById('scopePasteArea').style.display='none';
    document.getElementById('expCardArea').style.display='block';
    renderExpCard();
  }
}

render();

</script>
