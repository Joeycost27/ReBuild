<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rebuild</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#111;
  color:#eee;
  margin:0;
  padding:20px;
}

h1 { margin-top:0; }

textarea {
  width:100%;
  height:120px;
  background:#222;
  color:#eee;
  border:1px solid #444;
  padding:10px;
}

button {
  background:#333;
  color:#eee;
  border:1px solid #555;
  padding:8px 12px;
  margin:5px 5px 5px 0;
  cursor:pointer;
}

button:hover { background:#444; }

#expCard {
  margin-top:20px;
  padding:15px;
  background:#1a1a1a;
  border:1px solid #333;
}

.pill {
  display:inline-block;
  padding:6px 10px;
  margin:4px;
  border:1px solid #555;
  cursor:pointer;
  font-size:12px;
}

.pill.on {
  background:#4caf50;
  border-color:#4caf50;
  color:white;
}

.nav {
  margin-top:10px;
}

#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#333;
  padding:10px 15px;
  border:1px solid #555;
  opacity:0;
  transition:opacity 0.3s;
}

#toast.on { opacity:1; }

</style>
</head>

<body>

<h1>Rebuild</h1>

<div id="scopePasteArea">
  <textarea id="scopePaste" placeholder="Paste scope here..."></textarea><br>
  <button onclick="loadScope()">Load Scope</button>
</div>

<div id="expCardArea" style="display:none;">
  <div id="expCard"></div>

  <div class="nav">
    <button onclick="navExp(-1)">Prev</button>
    <button onclick="navExp(1)">Next</button>
  </div>
</div>

<div id="toast"></div>

<script>

/* ---------------- STATE ---------------- */

const STORAGE_KEY = 'rb3';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function persist(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function getState() {
  const s = load();
  return {
    week:    s.week    || 1,
    day:     s.day     || 1,
    qIdx:    s.qIdx !== undefined ? s.qIdx : 0,
    entries: s.entries || [],
    scope:   s.scope   || {}
  };
}

/* ---------------- SCOPE ---------------- */

function loadScope() {
  const raw = document.getElementById('scopePaste').value.trim();
  if (!raw) return showToast('Nothing pasted');

  const parsed = parseScope(raw);
  if (!parsed || Object.keys(parsed).length === 0) {
    return showToast('Scope not recognised');
  }

  const s = getState();
  s.scope = parsed;
  persist(s);

  buildExpList(s.scope);
  expIdx = 0;

  render();

  showToast('Scope loaded');
}

function parseScope(raw) {
  const scope = {};
  const codes = ['CONF','TRUST','VIS','INST','IDEN','NERV','ADHD','REL','FEAR'];

  codes.forEach(code => {
    const match = raw.split('##'+code+'##')[1];
    if (!match) return;

    const next = match.split('##')[0];

    const summaryMatch = next.match(/SUMMARY:(.*?)(EXP:|$)/s);
    const summary = summaryMatch ? summaryMatch[1].trim() : '';

    const exps = [];
    const expMatches = [...next.matchAll(/EXP:(.*?)(?=EXP:|$)/gs)];

    expMatches.forEach((m, i) => {
      let text = m[1].trim();

      const tagMatch = text.match(/\[(.*?)\]\s*$/);
      const tags = tagMatch ? tagMatch[1].split(',').map(t=>t.trim()) : [];

      text = text.replace(/\[(.*?)\]\s*$/, '').trim();

      exps.push({
        id: i,
        text,
        tags,
        state: 'open',
        obs: {}
      });
    });

    scope[code] = { summary, exps };
  });

  return scope;
}

/* ---------------- EXPERIENCES ---------------- */

let expList = [];
let expIdx = 0;

function buildExpList(scope) {
  expList = [];
  if (!scope) return;

  Object.keys(scope).forEach(code => {
    scope[code].exps.forEach((_, i) => {
      expList.push({ code, expIdx: i });
    });
  });
}

function renderExpCard() {
  const s = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = s.scope[item.code].exps[item.expIdx];

  const tagHtml = Object.keys(TAGS).map(t => {
    const on = exp.tags.includes(t);
    return `
      <span class="pill ${on ? 'on' : ''}"
        data-tag="${encodeURIComponent(t)}"
        onclick="toggleTag(this)">
        ${t}
      </span>`;
  }).join('');

  document.getElementById('expCard').innerHTML = `
    <div><strong>${item.code}</strong></div>
    <div style="margin:10px 0;">${exp.text}</div>
    <div>${tagHtml}</div>

    <textarea onchange="saveObs('note', this.value)"
      placeholder="Notes...">${exp.obs?.note || ''}</textarea>

    <div>
      <button onclick="setState('progressing')">Progressing</button>
      <button onclick="setState('closed')">Closed</button>
    </div>
  `;
}

/* ---------------- INTERACTION ---------------- */

function toggleTag(btn) {
  const t = decodeURIComponent(btn.dataset.tag);

  const s = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = s.scope[item.code].exps[item.expIdx];

  if (!exp.tags) exp.tags = [];

  const i = exp.tags.indexOf(t);
  if (i > -1) exp.tags.splice(i, 1);
  else exp.tags.push(t);

  persist(s);
  renderExpCard();
}

function saveObs(field, val) {
  const s = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = s.scope[item.code].exps[item.expIdx];

  if (!exp.obs) exp.obs = {};
  exp.obs[field] = val;

  persist(s);
}

function setState(st) {
  const s = getState();
  const item = expList[expIdx];
  if (!item) return;

  const exp = s.scope[item.code].exps[item.expIdx];

  exp.state = exp.state === st ? 'open' : st;

  persist(s);
  renderExpCard();
}

/* ---------------- NAV ---------------- */

function navExp(dir) {
  expIdx = (expIdx + dir + expList.length) % expList.length;
  renderExpCard();
}

/* ---------------- UI ---------------- */

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2000);
}

/* ---------------- TAGS ---------------- */

const TAGS = {
  'Held ground':{},
  'Named it':{},
  'Did not react':{},
  'Read room':{},
  'Trust break':{},
  'Body signal':{},
  'Stayed quiet':{},
  'Used script':{},
  'Pattern spotted':{},
  'Still open':{},
  'Win noted':{},
  'Cost named':{},
  'Avoidance':{},
  'Catastrophising':{},
  'Rumination':{},
  'Repair':{}
};

/* ---------------- INIT ---------------- */

function render() {
  const s = getState();

  if (s.scope && Object.keys(s.scope).length > 0) {
    buildExpList(s.scope);
    document.getElementById('scopePasteArea').style.display = 'none';
    document.getElementById('expCardArea').style.display = 'block';
    renderExpCard();
  }
}

render();

</script>

</body>
</html>
